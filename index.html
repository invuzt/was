<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wasm GPU 3D</title>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
    <canvas id="g"></canvas>
    <script>
        const canvas = document.getElementById('g');
        const gl = canvas.getContext('webgl');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Vertex Shader (Berjalan di GPU)
        const vsSource = `
            attribute vec4 aPos;
            uniform mat4 uMat;
            void main() { gl_Position = uMat * aPos; }
        `;

        // Fragment Shader (Warna di GPU)
        const fsSource = "void main() { gl_FragColor = vec4(0.0, 1.0, 0.0, 1.0); }";

        function createShader(gl, type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source);
            gl.compileShader(s);
            return s;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program);
        gl.useProgram(program);

        // Data Segitiga
        const vertices = new Float32Array([0, 0.5, 0,  -0.5, -0.5, 0,  0.5, -0.5, 0]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const aPos = gl.getAttribLocation(program, "aPos");
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

        const uMat = gl.getUniformLocation(program, "uMat");
        let wasm, angle = 0;
        const matPtr = 0; // Alamat memori di Wasm

        fetch('tiny.wasm?v=' + Math.random()).then(r => r.arrayBuffer())
        .then(b => WebAssembly.instantiate(b)).then(o => { wasm = o.instance; loop(); });

        function loop() {
            angle += 0.02;
            // Minta Rust hitung matrix rotasi
            wasm.exports.get_rotation_matrix(angle, matPtr);
            const matData = new Float32Array(wasm.exports.memory.buffer, matPtr, 16);

            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniformMatrix4fv(uMat, false, matData); // Kirim matrix ke GPU
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
