<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasm Face Geometry</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; margin-top: 10px; }
        video, canvas { border: 1px solid #222; border-radius: 10px; }
        #overlay { position: absolute; top: 0; left: 0; }
        .log { font-size: 10px; color: #0f0; width: 320px; padding: 5px; }
    </style>
</head>
<body>
    <div class="log">> GEOMETRY_SCAN: ACTIVE</div>
    <div id="container">
        <video id="v" width="320" height="240" autoplay playsinline></video>
        <canvas id="overlay" width="320" height="240"></canvas>
    </div>
    <canvas id="proc" width="100" height="100" style="display:none"></canvas>
    <script>
        const v = document.getElementById('v');
        const proc = document.getElementById('proc').getContext('2d', {willReadFrequently: true});
        const ovl = document.getElementById('overlay').getContext('2d');
        let wasm;

        fetch('tiny.wasm?v=' + Math.random()).then(r => r.arrayBuffer())
        .then(b => WebAssembly.instantiate(b)).then(o => { wasm = o.instance; loop(); });

        navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}}).then(s => v.srcObject = s);

        function unpack(val) {
            return { x: (val & 0xFF) * 3.2, y: ((val >> 8) & 0xFF) * 2.4 };
        }

        function loop() {
            proc.drawImage(v, 0, 0, 100, 100);
            const imgData = proc.getImageData(0, 0, 100, 100);
            const ptr = wasm.exports.get_buffer_ptr();
            const buf = new Uint8Array(wasm.exports.memory.buffer, ptr, 100 * 100 * 4);
            buf.set(imgData.data);

            const res = wasm.exports.detect_geometry();
            const p1 = unpack(Number(res & 0xFFFFn));
            const p2 = unpack(Number((res >> 16n) & 0xFFFFn));
            const p3 = unpack(Number((res >> 32n) & 0xFFFFn));
            const p4 = unpack(Number((res >> 48n) & 0xFFFFn));

            ovl.clearRect(0,0,320,240);
            ovl.lineWidth = 1;
            
            // Draw Points
            [[p1, 'EYE_L'], [p2, 'EYE_R'], [p3, 'NOSE'], [p4, 'MOUTH']].forEach(([p, l]) => {
                if(p.x > 0) {
                    ovl.strokeStyle = '#0f0';
                    ovl.strokeRect(p.x-5, p.y-5, 10, 10);
                    ovl.fillStyle = '#0f0';
                    ovl.fillText(l, p.x+8, p.y+4);
                }
            });

            // Draw Triangle Logic
            if(p1.x && p2.x && p4.x) {
                ovl.beginPath();
                ovl.strokeStyle = 'rgba(0, 255, 0, 0.3)';
                ovl.moveTo(p1.x, p1.y); ovl.lineTo(p2.x, p2.y);
                ovl.lineTo(p4.x, p4.y); ovl.closePath();
                ovl.stroke();
            }
            
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
