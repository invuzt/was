<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wasm Cam Shutter</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas#slint-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .flash { position: absolute; width: 100%; height: 100%; background: white; z-index: 100; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="flash" class="flash"></div>
    <video id="cam" autoplay playsinline></video>
    
    <script type="module">
        import init from './pkg/wasm_tiny.js';
        
        const video = document.getElementById('cam');
        const flash = document.getElementById('flash');

        // Fungsi Shutter yang dipanggil dari Rust
        window.js_capture_shutter = () => {
            // Efek Flash
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 100);

            // Capture Frame
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Download Hasil Foto
            const link = document.createElement('a');
            link.download = `shot_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (e) { alert("Camera Error: " + e); }
        }

        startCam();
        init();
    </script>
</body>
</html>
