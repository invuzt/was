<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rust Cam</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }
        /* Slint akan mencari canvas, kita sediakan container transparan di atas video */
        canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10; pointer-events: auto;
        }
        #flash { 
            position: absolute; width: 100%; height: 100%; 
            background: white; z-index: 100; opacity: 0; pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="flash"></div>
        <video id="cam" autoplay playsinline></video>
    </div>
    
    <script type="module">
        import init from './pkg/wasm_tiny.js';
        
        const video = document.getElementById('cam');
        const flash = document.getElementById('flash');

        window.js_capture_shutter = () => {
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 100);

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const link = document.createElement('a');
            link.download = `shot_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s)
            .catch(e => console.error(e));

        init(); 
    </script>
</body>
</html>
