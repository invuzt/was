<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wasm Camera</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .status-box { border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; width: 90%; max-width: 400px; font-size: 12px; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        video { width: 90%; max-width: 400px; border: 2px solid #0f0; border-radius: 4px; filter: brightness(1.2) contrast(1.1); }
        #res { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div class="status-box">
        > SYSTEM_READY: TRUE<br>
        > WASM_VAL: <span id="res">loading...</span><br>
        > CAM_STATUS: <span id="cam-status">waiting permit...</span>
    </div>

    <video id="cam" autoplay playsinline></video>

    <script>
        const video = document.getElementById('cam');
        const resEl = document.getElementById('res');
        const camStatus = document.getElementById('cam-status');

        // 1. Load Wasm dengan Cache Buster (?v=...)
        fetch('tiny.wasm?v=' + Math.random()).then(r => r.arrayBuffer())
        .then(b => WebAssembly.instantiate(b))
        .then(o => {
            const result = o.instance.exports.check_wasm(41);
            resEl.textContent = result + " (OK)";
        }).catch(e => resEl.textContent = "ERR: " + e.message);

        // 2. Start Camera
        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                camStatus.textContent = "STREAMING_ACTIVE";
                camStatus.style.color = "#0f0";
            } catch (err) {
                camStatus.textContent = "PERMISSION_DENIED";
                camStatus.style.color = "#f00";
                console.error(err);
            }
        }

        startCam();
    </script>
</body>
</html>
