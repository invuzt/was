<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slint 3D Camera</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas#gl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video#cam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0; transition: 0.5s; }
        canvas#slint-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        /* Slint butuh pointer-events di element spesifik, tapi di sini kita buat transparan */
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline></video>
    <canvas id="gl-canvas"></canvas>
    <script type="module">
        import init from './pkg/wasm_tiny.js';
        
        let cameraActive = false;
        const video = document.getElementById('cam');

        window.web_toggle_camera = async () => {
            if(!cameraActive) {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                video.srcObject = stream;
                video.style.opacity = "0.4";
                cameraActive = true;
            } else {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.style.opacity = "0";
                cameraActive = false;
            }
        };

        window.web_change_model = (ptr, len) => {
            console.log("Model changed via Slint");
        };

        init().then(() => {
            console.log("Slint & WASM Loaded");
        });
    </script>
</body>
</html>
