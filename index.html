<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rust Cam</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #flash { 
            position: absolute; width: 100%; height: 100%; 
            background: white; z-index: 100; opacity: 0; pointer-events: none; 
        }
        /* Slint akan merender otomatis ke canvas yang dibuatnya sendiri */
    </style>
</head>
<body>
    <div id="flash"></div>
    <video id="cam" autoplay playsinline></video>
    
    <script type="module">
        import init from './pkg/wasm_tiny.js';
        
        const video = document.getElementById('cam');
        const flash = document.getElementById('flash');

        // Fungsi Shutter: Capture & Save
        window.js_capture_shutter = () => {
            // 1. Efek Flash
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 150);

            // 2. Mengambil Frame dari Video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Mirroring jika pakai kamera depan (opsional)
            ctx.drawImage(video, 0, 0);
            
            // 3. Simpan ke Download
            const dataUrl = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `RUST_SHOT_${new Date().getTime()}.png`;
            link.href = dataUrl;
            link.click();
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Gagal akses kamera: ", err);
            }
        }

        startCamera();
        init(); // Inisialisasi Slint Wasm
    </script>
</body>
</html>
