<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasm Cam</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #0f0; padding: 15px; text-align: left; width: 90%; max-width: 400px; margin-bottom: 10px; }
        video { width: 90%; max-width: 400px; border: 2px solid #0f0; border-radius: 5px; background: #111; }
    </style>
</head>
<body>
    <div class="box">
        > WASM_STATUS: <span id="ws">loading...</span><br>
        > CAM_STATUS: <span id="cs">waiting...</span>
    </div>
    <video id="v" autoplay playsinline></video>
    <script>
        const v = document.getElementById('v');
        const ws = document.getElementById('ws');
        const cs = document.getElementById('cs');

        fetch('tiny.wasm?v=' + Math.random())
            .then(r => r.arrayBuffer())
            .then(b => WebAssembly.instantiate(b))
            .then(o => {
                ws.textContent = o.instance.exports.check_wasm(41) + " (READY)";
            }).catch(e => ws.textContent = "ERR: " + e.message);

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(s => { v.srcObject = s; cs.textContent = "ACTIVE"; })
            .catch(e => { cs.textContent = "DENIED"; cs.style.color = "red"; });
    </script>
</body>
</html>
